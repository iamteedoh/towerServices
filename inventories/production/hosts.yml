---
# Production inventory (YAML inventory plugin). Replace the sample hostnames.
# Groups map 1:1 to a maintenance "scope" used by the Homepage buttons.
all:
  children:

    # --- Ansible Automation Platform 2.x controller (systemd on VMs) ---
    aap_controller:
      hosts:
        controller1.example.tld:
        controller2.example.tld:

    # --- Private Automation Hub (pulpcore, systemd) ---
    aap_hub:
      hosts:
        hub1.example.tld:

    # --- Event-Driven Ansible (systemd) ---
    aap_eda:
      hosts:
        eda1.example.tld:

    # --- Legacy Ansible Tower 3.x (single umbrella service) ---
    legacy_tower:
      hosts:
        tower-legacy1.example.tld:

    # --- AWX on Kubernetes: a control-node entry that talks to the cluster ---
    awx:
      hosts:
        awx-control:
          ansible_connection: local
          ansible_python_interpreter: "{{ ansible_playbook_python }}"

[defaults]
inventory = inventories/production
roles_path = roles
host_key_checking = False
# Readable YAML task output (built-in default callback, ansible-core >= 2.13)
result_format = yaml
retry_files_enabled = False
# Preserve native types from templates so e.g. "{{ n | int }}" stays an int.
# Required for the AWX CR patch (spec.replicas must be an integer, not a string).
jinja2_native = True
interpreter_python = auto_silent

[privilege_escalation]
become = False
become_method = sudo

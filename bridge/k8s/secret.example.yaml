---
# Template only — do NOT commit a real token. Create the secret out-of-band so
# the value never lands in git:
#   kubectl -n <namespace> create secret generic towerservices-bridge \
#       --from-literal=token="$(openssl rand -hex 24)"
apiVersion: v1
kind: Secret
metadata:
  name: towerservices-bridge
  namespace: default      # change to your namespace
type: Opaque
stringData:
  token: "CHANGE-ME-generate-with-openssl-rand-hex-24"
